<!doctype html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
    />
    <title>QX-Typed App</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Basecoat UI -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/basecoat.cdn.min.css"
    />

    <!-- Theme (must come after basecoat to override) -->
    <link rel="stylesheet" href="theme.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/js/all.min.js"
      defer
    ></script>

    <!-- PWA -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Make sure the qooxdoo script is included before your own application code -->
    <script type="text/javascript" src="resource/qooxdoo.js"></script>
  </head>
  <body>
    <!-- Now include your own application code via RequireJS -->
    <script src="lib/application.js"></script>
    <div id="toaster"></div>
  </body>
</html>
